<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ระบบหลังบ้าน</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background: url('image/bglogin.jpg') no-repeat center center fixed; 
            background-size: cover; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
            position: relative;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.3); /* 30% transparency dark overlay */
            z-index: 0;
        }
        .login-container { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 2.5rem; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); 
            width: 100%; max-width: 400px; text-align: center; 
            position: relative; z-index: 1;
        }
        h1 { color: #333; margin-bottom: 1.5rem; font-size: 1.5rem; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; box-sizing: border-box; }
        button[type="submit"], .btn-return { 
            width: 100%; 
            padding: 12px; 
            border: none; 
            border-radius: 5px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            display: inline-block;
            text-align: center;
            text-decoration: none;
            box-sizing: border-box;
        }
        button[type="submit"] { background: #ffcc00; color: #000; }
        button[type="submit"]:hover { background: #e6b800; }
        .btn-return { background: #4a4a4a; color: white; margin-top: 15px; }
        .btn-return:hover { background: #333333; }
        .error { color: red; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>เข้าสู่ระบบจัดการ (Admin)</h1>
        <div class="error" id="errorMsg">ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง!</div>
        <form id="loginForm">
            <input type="text" id="username" placeholder="ชื่อผู้ใช้งาน" required>
            <input type="password" id="password" placeholder="รหัสผ่าน" required>
            <button type="submit">ล็อคอิน</button>
        </form>
        <a href="index.html" class="btn-return">กลับสู่หน้าหลัก</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch('api_login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/admin.html';
                } else {
                    document.getElementById('errorMsg').style.display = 'block';
                }
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
